<form class="form">
  <h2>Agregar medicamento</h2>

  <!-- Nombre -->
  <div class="form-group">
    <label>Nombre</label>
    <input type="text" placeholder="Ej. Paracetamol" />
  </div>

  <!-- Dosis -->
  <div class="form-group">
    <label>Dosis</label>
    <input type="text" placeholder="Ej. 500 mg" />
  </div>

  <!-- Frecuencia -->
  <div class="form-group">
    <label>Frecuencia</label>
    <input type="text" placeholder="Ej. Cada 8 horas" />
  </div>

  <!-- Horario -->
  <div class="form-group">
    <label>Hora</label>
    <input type="time" />
  </div>

  <!-- Duración -->
  <div class="form-group">
    <label>Duración</label>
    <input type="text" placeholder="Ej. 7 días" />
  </div>

  <!-- Cantidad -->
  <div class="form-group">
    <label>Cantidad</label>
    <input type="number" placeholder="Ej. 10 tabletas" />
  </div>

  <!-- Indicaciones -->
  <div class="form-group">
    <label>Indicaciones</label>
    <textarea placeholder="Ej. Después de comer"></textarea>
  </div>

  <!-- Botón -->
  <button type="submit" class="submit-btn">Guardar</button>
</form>
