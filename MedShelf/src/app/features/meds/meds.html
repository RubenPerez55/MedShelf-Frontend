<div class="treatment-container">
  <!-- Header -->
  <div class="header">
    <h2>Tratamientos</h2>
  </div>

  <!-- Lista de tratamientos -->
  <div class="treatment-list">
    <!-- Card -->
    <p>Mañana</p>

    <div class="treatment-group">
      @for (med of meds; track med.id) {
        <div class="treatment-card">
          <div class="left">
            <div class="time">{{ med.time }}</div>
          </div>

          <div class="center">
            <h3>{{ med.name }}</h3>
            <p>{{ med.dosage }}</p>
          </div>

          <div class="right">
            <button [ngClass]="med.status === 'taken' ? 'take-btn taken' : 'take-btn pending'">
              {{ med.status === 'taken' ? 'Tomado' : 'Pendiente' }}
            </button>
          </div>
        </div>
      }
    </div>

    <!-- Card -->
    <p>Tarde</p>
    <div class="treatment-group">
      <div class="treatment-card">
        <div class="left">
          <div class="time">14:00</div>
        </div>

        <div class="center">
          <h3>Ibuprofeno</h3>
          <p>1 cápsula • Cada 8 hrs</p>
        </div>

        <div class="right">
          <button class="take-btn">Tomado</button>
        </div>
      </div>
    </div>

    <!-- Card -->
    <p>Noche</p>
    <div class="treatment-group">
      <div class="treatment-card">
        <div class="left">
          <div class="time">22:00</div>
        </div>

        <div class="center">
          <h3>Amoxicilina</h3>
          <p>500mg • 7 días</p>
        </div>

        <div class="right">
          <button class="take-btn pending">Pendiente</button>
        </div>
      </div>
    </div>
  </div>
  <a class="fab" routerLink="/meds/add-treatment" title="Agregar tratamiento">
    <lucide-angular [img]="icons.plus" size="24" class="fab-icon"></lucide-angular>
  </a>
</div>
